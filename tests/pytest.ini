[pytest]
testpaths = .
addopts = -v --tb=short --color=yes -ra
markers =
    iam: Identity & Access workspace tests
    profiling: Customer Profiling workspace tests
    billing: Billing & Payments workspace tests
    notify: Notifications workspace tests
    tickets: Tickets & Claims workspace tests
    e2e: End-to-end cross-workspace tests
    slow: Tests that take a few seconds (network heavy)
